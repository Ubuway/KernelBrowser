name: 🚀 Build Android APK

on:
  push:
    branches: [build-android-20251211]
  pull_request:
    branches: [build-android-20251211]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 🔧 Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 📁 Prepare Android project
      run: |
        echo "🛠️ Preparing Kernel Browser for Android..."
        
        # Create Android project structure
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/ubuway/kernel
        mkdir -p app/src/main/res
        
        # Copy all web files to assets
        echo "📄 Copying web files..."
        find . -maxdepth 1 -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" | \
          xargs -I {} cp {} app/src/main/assets/ 2>/dev/null || true
        
        # Create AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.ubuway.kernel">

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="Kernel Browser"
        android:theme="@style/Theme.AppCompat.Light.NoActionBar"
        android:usesCleartextTraffic="true">
        
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|keyboardHidden|screenSize"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST
        
        # Create MainActivity.java
        cat > app/src/main/java/com/ubuway/kernel/MainActivity.java << 'JAVA'
package com.ubuway.kernel;

import android.os.Bundle;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    private WebView webView;
    
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        
        webView = findViewById(R.id.webview);
        
        WebSettings webSettings = webView.getSettings();
        webSettings.setJavaScriptEnabled(true);
        webSettings.setDomStorageEnabled(true);
        webSettings.setAllowFileAccess(true);
        webSettings.setAllowContentAccess(true);
        
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/index.html");
    }
    
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) {
            webView.goBack();
        } else {
            super.onBackPressed();
        }
    }
}
JAVA
        
        # Create layout
        cat > app/src/main/res/layout/activity_main.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<WebView xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:tools="http://schemas.android.com/tools"
    android:id="@+id/webview"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    tools:context=".MainActivity" />
XML
        
        # Create build.gradle files
        cat > build.gradle << 'ROOT_GRADLE'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
ROOT_GRADLE
        
        cat > app/build.gradle << 'APP_GRADLE'
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ubuway.kernel'
    compileSdk 34
    
    defaultConfig {
        applicationId "com.ubuway.kernel"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.8.0'
}
APP_GRADLE
        
        echo "✅ Android project structure created"
        
    - name: 🔨 Build APK
      run: |
        echo "🏗️ Building APK..."
        cd app
        chmod +x ./gradlew || true
        ./gradlew assembleDebug
        
        echo "📊 Build output:"
        ls -la build/outputs/apk/debug/
        
    - name: 📦 Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-browser-android
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90
        
    - name: 🏷️ Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: android-v1.0.${{ github.run_number }}
        name: Kernel Browser Android v1.0.${{ github.run_number }}
        body: |
          🚀 Android APK built from GitHub Actions
          
          ### Installation:
          1. Download the APK below
          2. On Android, enable "Install from unknown sources"
          3. Install and launch
          
          ### Build Info:
          - Branch: ${{ github.ref }}
          - Commit: ${{ github.sha }}
          - Run: #${{ github.run_number }}
          
          ### Features:
          - WebView with JavaScript
          - Fullscreen browser
          - Hardware accelerated
        files: app/build/outputs/apk/debug/*.apk
