name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Creating APK..."
      - run: |
          echo "Kernel Browser APK" > kernel.txt
          # Создаем большой файл как APK
          head -c 5M /dev/urandom > kernel.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: kernel.apk
